# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 120
indent-width = 4

target-version = "py312"

[lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
select = ["ALL"]
extend-select = ["E", "W"]
ignore = [
    "ANN001", # Missing type annotation for function argument {name}
    "ANN201", # Missing return type annotation for public function {name}
    "ANN202", # Missing return type annotation for private function {name}
    "BLE001", # Do not catch blind exception: {name}
    "COM812", # Trailing comma missing
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D105",   # Missing docstring in public method
    "D106",   # Missing docstring in public nested class
    "D107",   # Missing docstring in public __init__
    "D200",   # One-line docstring should fit on one line
    "D205",   # 1 blank line required between summary line and description
    "D212",   # Multi-line docstring summary should start at the first line
    "D400",   # First line should end with a period
    "D401",   # First line of docstring should be in imperative mood
    "D413",   # Missing blank line after last section ("{name}")
    "D415",   # First line should end with a period, question mark, or exclamation point
    "E305",   # Expected 2 blank lines after class or function definition, found ({blank_lines})
    "N815",   # Variable {name} in class scope should not be mixedCase
    "PD008",  # Use .loc instead of .at. If speed is important, use NumPy.
    "Q000",   # Single quotes found but double quotes preferred
    "TD002",  # Missing author in TODO
    "TD003",  # Missing issue link for this TODO
    "TRY301", # Abstract `raise` to an inner function
    "TRY300", # Consider moving this statement to an `else` block
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
# Like Black, use double quotes for strings.
quote-style = "preserve"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"
